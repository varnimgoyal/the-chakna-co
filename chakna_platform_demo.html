<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Chakna Co. Unified Platform Demo</title>
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- TailwindCSS & Icons -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/antd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.14.0/reset.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ant-design-icons/5.3.0/index.umd.js"></script>

  <script>
    tailwind.config = {
      theme: { extend: { colors: { primary: '#FF4A22', surface: '#242424', 'brand-dark': '#0d0d0d' } } }
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;800;900&display=swap');
    body { background-color: #0d0d0d; font-family: 'Outfit', sans-serif; color: white; margin: 0; padding: 0; min-height: 100vh;}
    ::-webkit-scrollbar { display: none; }
    
    .phone-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;}
    .ios-device { width: 390px; height: 844px; background-color: #1A1A1A; border-radius: 40px; overflow: hidden; position: relative; border: 8px solid #333; box-shadow: 0 20px 50px rgba(255, 74, 34, 0.15); }
    .android-device { width: 412px; height: 915px; background-color: #f5f5f5; border-radius: 20px; overflow: hidden; position: relative; border: 12px solid #222; box-shadow: 0 20px 50px rgba(255, 74, 34, 0.15); font-family: 'Inter', system-ui, sans-serif;}

    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
    @keyframes siren { 0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); } 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); } }
    .animate-siren { animation: siren 2s infinite; }

    /* Ant Override */
    .ant-card { background-color: #242424 !important; border: 1px solid #333 !important; color: white; }
    .ant-card-head { color: white !important; border-bottom: 1px solid #333 !important; }
    .ant-statistic-title { color: #a1a1aa !important; }
    .ant-table-wrapper .ant-table { background-color: #242424 !important; color: white !important; }
    .ant-table-thead > tr > th { background-color: #1f1f1f !important; color: #a1a1aa !important; border-bottom: 1px solid #333 !important; }
    .ant-table-tbody > tr > td { border-bottom: 1px solid #333 !important; }
    .ant-table-tbody > tr:hover > td { background-color: #333 !important; }
    
    /* Native Checkbox styling for web */
    input[type=checkbox] { accent-color: #FF4A22; width: 1.5rem; height: 1.5rem; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Card, Row, Col, Table, Tag, DatePicker, Statistic, ConfigProvider, theme: antTheme } = antd;
    const { TruckOutlined, UserOutlined, WarningOutlined } = icons;

    // --- ADMIN PANEL ---
    const AdminApp = ({ onExit }) => {
      const pendingTiffins = [
        { key: '1', name: 'John Doe', phone: '9876543210', address: 'A-204, Spectrum Heights', plan: 'Tiffin Premium', status: 'pending' },
        { key: '2', name: 'Riya Singh', phone: '8765432109', address: 'Villa 14, Omaxe Woods', plan: 'Tiffin Basic', status: 'dispatched' }
      ];
      const cols = [
        { title: 'Customer', dataIndex: 'name', render: (text, rec) => <div><span className="font-bold text-white text-base">{text}</span><br/><span className="text-xs text-gray-400">{rec.phone}</span></div> },
        { title: 'Address', dataIndex: 'address' },
        { title: 'Plan', render: () => <Tag color="gold" className="rounded-full bg-opacity-20 border-0 font-bold">Premium</Tag> },
        { title: 'Status', dataIndex: 'status', render: s => <Tag color={s==='dispatched'?'#2ECC71':'#FF4A22'} className="uppercase font-bold">{s}</Tag> },
      ];
      useEffect(() => { feather.replace(); }, []);
      return (
        <ConfigProvider theme={{ algorithm: antTheme.darkAlgorithm }}>
          <div className="bg-[#1A1A1A] min-h-screen text-white p-6 md:p-12 animate-fadeIn relative">
            <button onClick={onExit} className="absolute top-6 right-6 bg-[#333] hover:bg-[#444] px-4 py-2 rounded-full font-bold transition flex items-center"><i data-feather="x" className="w-4 h-4 mr-2"></i> Exit View</button>
            <div className="max-w-6xl mx-auto">
              <h2 className="text-4xl font-extrabold text-[#FF4A22] mb-2 tracking-tight">Super Admin Hub</h2>
              <p className="text-gray-400 mb-8 font-medium">Full business oversight.</p>
              <Row gutter={[16, 16]} className="mb-8">
                <Col xs={24} sm={12} lg={8}><Card><Statistic title="Monthly Revenue" value="₹4,25,000" valueStyle={{ color: '#fff', fontSize: '2rem', fontWeight: 800 }} /></Card></Col>
                <Col xs={24} sm={12} lg={8}><Card><Statistic title="Tiffins Dispatched Today" value={142} prefix={<TruckOutlined style={{color:'#2ECC71'}} />} valueStyle={{ color: '#fff', fontSize: '2rem', fontWeight: 800 }} /></Card></Col>
                <Col xs={24} sm={24} lg={8}><Card><Statistic title="Pending Catering Leads" value={5} prefix={<WarningOutlined style={{color:'#FFB800'}} />} valueStyle={{ color: '#FFB800', fontSize: '2rem', fontWeight: 800 }} /></Card></Col>
              </Row>
              <Card title="Today's Logistics Focus"><Table columns={cols} dataSource={pendingTiffins} pagination={false} scroll={{ x: 600 }} /></Card>
            </div>
          </div>
        </ConfigProvider>
      );
    };

    // --- CUSTOMER APP ---
    const CustomerApp = ({ onExit }) => {
      const [screen, setScreen] = useState('home');
      const [cart, setCart] = useState([]);
      const addToCart = (item) => setCart([...cart, item]);
      const cartTotal = cart.reduce((acc, curr) => acc + curr.cost, 0);

      useEffect(() => { feather.replace(); }, [screen]);

      const Home = () => (
        <div className="flex flex-col h-full w-full animate-fadeIn bg-black">
          <div className="pt-20 px-6 pb-6"><h1 className="text-4xl font-black text-white leading-tight tracking-tighter">What's your plan<br/>today, brah?</h1></div>
          <div className="px-5 flex flex-col gap-4">
            <div onClick={() => setScreen('menu')} className="bg-[#FF4A22] rounded-3xl p-6 min-h-[140px] flex items-center shadow-lg cursor-pointer transform hover:scale-[1.02] active:scale-95 transition-all">
              <i data-feather="coffee" className="text-white w-10 h-10"></i>
              <div className="ml-4">
                <h2 className="text-white text-lg font-bold mb-1">The Chakna Co. Restaurant</h2>
                <p className="text-white text-sm opacity-90 leading-tight">Hey, have friends coming in, need to order quick!</p>
              </div>
            </div>
            <div onClick={() => setScreen('catering')} className="bg-[#2A2A2A] rounded-3xl p-6 min-h-[140px] flex items-center border border-[#444] shadow-lg cursor-pointer transform hover:scale-[1.02] active:scale-95 transition-all">
              <i data-feather="calendar" className="text-white w-10 h-10"></i>
              <div className="ml-4">
                <h2 className="text-white text-lg font-bold mb-1">The Chakna Co. Catering</h2>
                <p className="text-[#bbb] text-sm leading-tight">Hey 'am planning for a party; can you do buffet!</p>
              </div>
            </div>
            <div onClick={() => setScreen('tiffins')} className="bg-[#FFB800] rounded-3xl p-6 min-h-[140px] flex items-center shadow-lg cursor-pointer transform hover:scale-[1.02] active:scale-95 transition-all">
              <i data-feather="shopping-bag" className="text-white w-10 h-10"></i>
              <div className="ml-4">
                <h2 className="text-[#111] text-lg font-bold mb-1">The Chakna Co. Tiffins</h2>
                <p className="text-[rgba(0,0,0,0.8)] text-sm font-medium leading-tight">Hey 'am your regular, tiffin is what I need!</p>
              </div>
            </div>
          </div>
        </div>
      );

      const Catering = () => (
        <div className="flex flex-col h-full w-full relative animate-fadeIn bg-[#111]">
          <div className="pt-16 pb-4 px-6 border-b border-[#333] flex items-center bg-[#1A1A1A] z-10 sticky top-0">
            <div onClick={() => setScreen('home')} className="mr-4 cursor-pointer p-1"><i data-feather="chevron-left" className="text-white w-8 h-8"></i></div>
            <div>
              <h1 className="text-white text-2xl font-black tracking-tight">Catering</h1>
              <p className="text-[#bbb] text-xs font-bold uppercase tracking-wider mt-1">Host Like a Pro</p>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto px-6 pb-14 pt-8">
            <p className="text-[#FF4A22] font-semibold text-sm mb-6 leading-relaxed italic text-center text-opacity-90">"Perfectionists in Mughlai | Punjabi | Maharashtrian | Chinese | Continental | Gujarati cuisines"</p>
            <div className="flex flex-col gap-4">
              <div><label className="text-white text-[10px] font-black uppercase tracking-widest mb-1.5 block opacity-70 ml-1">Full Name</label><input type="text" placeholder="Kabir Sharma" className="w-full bg-[#1A1A1A] text-white p-4 rounded-2xl border-2 border-[#333] focus:border-white focus:outline-none transition-colors" /></div>
              <div><label className="text-white text-[10px] font-black uppercase tracking-widest mb-1.5 block opacity-70 ml-1">Phone Number</label><input type="tel" placeholder="9876543210" className="w-full bg-[#1A1A1A] text-white p-4 rounded-2xl border-2 border-[#333] focus:border-white focus:outline-none transition-colors" /></div>
              <div className="flex gap-3">
                <div className="flex-1"><label className="text-white text-[10px] font-black uppercase tracking-widest mb-1.5 block opacity-70 ml-1">Guests</label><input type="number" placeholder="50" className="w-full bg-[#1A1A1A] text-white p-4 rounded-2xl border-2 border-[#333] focus:border-white focus:outline-none transition-colors" /></div>
                <div className="flex-1"><label className="text-white text-[10px] font-black uppercase tracking-widest mb-1.5 block opacity-70 ml-1">Date</label><input type="date" className="w-full bg-[#1A1A1A] text-[#bbb] p-4 rounded-2xl border-2 border-[#333] focus:border-white focus:outline-none transition-colors" /></div>
              </div>
              <div><label className="text-white text-[10px] font-black uppercase tracking-widest mb-1.5 block opacity-70 ml-1">Occasion</label><select className="w-full bg-[#1A1A1A] text-white p-4 rounded-2xl border-2 border-[#333] focus:border-white focus:outline-none appearance-none transition-colors"><option>Birthday Party</option><option>Wedding Event</option><option>Corporate Gathering</option><option>Other</option></select></div>
              <button className="w-full bg-white text-[#111] font-black uppercase tracking-widest py-4.5 rounded-2xl mt-4 active:scale-95 transition-transform shadow-lg">Submit Enquiry</button>
            </div>
          </div>
        </div>
      );

      const Tiffins = () => (
        <div className="flex flex-col h-full w-full relative animate-fadeIn bg-[#111]">
          <div className="pt-16 pb-4 px-6 border-b border-[#FFB800]/20 flex items-center justify-between bg-[#1A1A1A] z-10 sticky top-0 shadow-lg shadow-black/50">
            <div className="flex items-center">
              <div onClick={() => setScreen('home')} className="mr-3 cursor-pointer p-1"><i data-feather="chevron-left" className="text-white w-8 h-8"></i></div>
              <div>
                <h1 className="text-[#FFB800] text-2xl font-black tracking-tight">Tiffins</h1>
                <p className="text-white text-[10px] uppercase font-bold opacity-80 mt-1 tracking-wider">Premium Plan</p>
              </div>
            </div>
            <div className="text-right">
              <p className="text-[9px] text-[#FFB800] uppercase font-black tracking-widest mb-0.5">Wallet Points</p>
              <p className="text-white font-black text-xl">₹2,450</p>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto px-5 py-6">
            <div className="bg-[#242424] rounded-3xl p-6 mb-6 border border-[#333] shadow-lg relative overflow-hidden">
              <div className="absolute top-0 right-0 w-24 h-24 bg-[#FFB800] opacity-[0.03] rounded-bl-[100px]"></div>
              <h2 className="text-white font-black text-lg mb-6 flex items-center tracking-tight"><i data-feather="calendar" className="mr-2 w-5 h-5 text-[#FFB800]"></i> Schedule</h2>
              <div className="flex justify-between items-center relative">
                <div className="absolute top-5 left-4 right-4 h-0.5 bg-[#444] -z-10"></div>
                {['Mon', 'Tue', 'Wed', 'Thu', 'Fri'].map((day, i) => (
                  <div key={day} className="flex flex-col items-center">
                    <span className="text-[#888] text-[10px] uppercase tracking-widest font-black mb-3">{day}</span>
                    <div className={`w-10 h-10 rounded-full border-[3px] border-[#242424] flex items-center justify-center font-bold text-sm shadow-md transition-all ${i < 2 ? 'bg-[#2ECC71] text-white scale-110' : i === 2 ? 'bg-white text-black scale-110' : 'bg-[#333] text-[#888]'}`}>
                      {i < 2 ? <i data-feather="check" className="w-5 h-5"></i> : 24 + i}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="bg-[#242424] rounded-3xl p-6 border border-[#333] shadow-lg">
               <h2 className="text-white font-black text-lg mb-6 flex items-center tracking-tight"><i data-feather="sliders" className="mr-3 w-5 h-5 text-[#FFB800]"></i> Manage Meal</h2>
               <button className="w-full bg-gradient-to-r from-[#FFB800] to-[#ffcc33] text-black py-4 rounded-xl font-black tracking-widest shadow-[0_5px_15px_rgba(255,184,0,0.2)] transition-all active:scale-95 flex justify-between px-5 items-center mb-3">
                 <span>Add Extras (Desserts)</span><i data-feather="plus" className="w-5 h-5"></i>
               </button>
               <button className="w-full bg-[#1A1A1A] text-white py-4 rounded-xl border-2 border-[#333] font-bold tracking-wide hover:border-[#444] transition-all active:scale-95 flex justify-between px-5 items-center">
                 <span>Cancel Tomorrow's Tiffin</span><i data-feather="x" className="text-[#aaa] w-5 h-5"></i>
               </button>
            </div>
            <button className="w-full mt-6 border-2 border-[#FFB800] text-[#FFB800] font-black tracking-widest uppercase py-4 rounded-full active:scale-95 shadow">Top-up Wallet</button>
          </div>
        </div>
      );

      const Menu = () => (
        <div className="flex flex-col h-full w-full relative animate-fadeIn bg-[#111] pb-20">
          <div className="pt-16 pb-4 px-6 border-b border-[#333] flex items-center bg-[#1A1A1A] z-10 sticky top-0"><div onClick={() => setScreen('home')} className="mr-4 cursor-pointer p-1"><i data-feather="chevron-left" className="text-white w-8 h-8"></i></div><div><h1 className="text-[#FF4A22] text-2xl font-black tracking-tight">Restaurant</h1><p className="text-[#aaa] text-[10px] font-black uppercase tracking-widest mt-1">Order Now</p></div></div>
          <div className="flex-1 overflow-y-auto px-5 pt-6">
            {[{ id: 1, name: 'Tandoori Chicken Tikka', desc: 'Juicy chicken chunks marinated in spiced yogurt.', cost: 340, veg: false }, { id: 2, name: 'Dal Makhani', desc: 'Rich and creamy slow-cooked black lentils.', cost: 280, veg: true }, { id: 3, name: 'Crispy Corn Salt & Pepper', desc: 'Golden fried corn kernels tossed with peppers.', cost: 220, veg: true }].map(item => (
              <div key={item.id} className="bg-[#242424] p-5 rounded-3xl mb-4 text-white shadow-xl border border-[#333]">
                <div className="flex items-center mb-2"><div className={`w-3.5 h-3.5 border-2 flex justify-center items-center rounded-sm mr-3 ${item.veg?'border-green-500':'border-red-500'}`}><div className={`w-1.5 h-1.5 rounded-full ${item.veg?'bg-green-500':'bg-red-500'}`}></div></div><h3 className="font-bold text-lg">{item.name}</h3></div>
                <p className="text-[#888] text-sm mb-4 leading-relaxed">{item.desc}</p>
                <div className="flex justify-between items-center"><span className="font-black text-xl">₹{item.cost}</span><button onClick={() => addToCart(item)} className="px-5 py-2 rounded-xl border-2 border-[#FF4A22] text-[#FF4A22] font-black tracking-wider hover:bg-[#FF4A22] hover:text-white transition-colors active:scale-95">+ ADD</button></div>
              </div>
            ))}
          </div>
          {cart.length > 0 && (
            <div className="absolute bottom-6 left-5 right-5 bg-gradient-to-r from-[#FF4A22] to-[#ff6a47] rounded-2xl p-4 flex justify-between items-center shadow-lg shadow-[#FF4A22]/20">
              <div><div className="text-white text-xs font-black tracking-widest opacity-90 mb-0.5">{cart.length} ITEM{cart.length>1?'S':''}</div><div className="text-white font-black text-xl">₹{cartTotal}</div></div>
              <button onClick={() => setScreen('cart')} className="bg-white text-[#FF4A22] py-2.5 px-6 rounded-full font-black shadow active:scale-95 tracking-wide">View Cart</button>
            </div>
          )}
        </div>
      );

      const Cart = () => (
        <div className="flex flex-col h-full w-full relative animate-fadeIn bg-[#111]">
          <div className="pt-16 pb-4 px-6 border-b border-[#333] flex items-center bg-[#1A1A1A] z-10 sticky top-0"><div onClick={() => setScreen('menu')} className="mr-4 cursor-pointer p-1"><i data-feather="chevron-left" className="text-white w-8 h-8"></i></div><h1 className="text-white text-2xl font-black">Checkout</h1></div>
          <div className="flex-1 overflow-y-auto px-5 py-6">
            {cart.map((item, idx) => (<div key={idx} className="flex justify-between items-center bg-[#242424] p-4 rounded-xl mb-3 text-white border border-[#333]"><span className="font-bold font-sm">{item.name}</span><span className="font-bold">₹{item.cost}</span></div>))}
            <div className="mt-6 border-t border-[#333] pt-6">
              <div className="flex justify-between text-[#888] font-bold mb-3 text-sm"><span>Subtotal</span><span>₹{cartTotal}</span></div>
              <div className="flex justify-between text-[#888] font-bold mb-3 text-sm"><span>Taxes & Fees (5%)</span><span>₹{(cartTotal*0.05).toFixed(2)}</span></div>
              <div className="flex justify-between text-white text-xl font-black mt-4 pt-4 border-t border-[#333]"><span>Grand Total</span><span className="text-[#FF4A22]">₹{(cartTotal * 1.05).toFixed(2)}</span></div>
            </div>
          </div>
          <div className="p-5 bg-[#1A1A1A] border-t border-[#333]">
             <button onClick={() => { setCart([]); setScreen('checkout_success'); }} className="w-full bg-[#FF4A22] text-white py-4 min-h-[56px] rounded-2xl font-black tracking-widest text-lg shadow-[0_5px_20px_rgba(255,74,34,0.3)] active:scale-95">CONFIRM ORDER</button>
          </div>
        </div>
      );

      return (
        <div className="phone-wrapper"><div className="ios-device">
          <button onClick={onExit} style={{zIndex:999}} className="absolute top-3 right-1/2 transform translate-x-1/2 bg-black/60 backdrop-blur text-[10px] font-bold tracking-widest uppercase px-3 py-1.5 rounded-full text-white hover:bg-[#333] border border-[#444]">Exit Sim</button>
          {screen === 'home' && <Home />}
          {screen === 'menu' && <Menu />}
          {screen === 'catering' && <Catering />}
          {screen === 'tiffins' && <Tiffins />}
          {screen === 'cart' && <Cart />}
          {screen === 'checkout_success' && (
            <div className="flex flex-col h-full bg-[#FF4A22] justify-center items-center p-6 text-center animate-fadeIn">
              <div className="w-24 h-24 bg-white rounded-full flex justify-center items-center mb-8 shadow-2xl"><i data-feather="check" className="text-[#FF4A22] w-12 h-12"></i></div>
              <h1 className="text-5xl font-black text-white mb-4 tracking-tighter">Balle Balle!</h1>
              <p className="text-white text-lg font-medium opacity-90 mb-12">Delicious food is getting ready. Happiness is on the way! 🛵</p>
              <button onClick={() => setScreen('home')} className="bg-white text-[#FF4A22] px-8 py-4 rounded-full font-black tracking-widest shadow-lg active:scale-95 w-full">BACK TO HOME</button>
            </div>
          )}
        </div></div>
      );
    };

    // --- RM APP (Zomato Partner Style) ---
    const RMApp = ({ onExit }) => {
      const [tab, setTab] = useState('live');
      useEffect(() => { feather.replace(); }, [tab]);

      return (
        <div className="phone-wrapper"><div className="android-device bg-[#F8F9FA] flex flex-col">
            <button onClick={onExit} style={{zIndex:999}} className="absolute top-1 right-2 text-white/60 hover:text-white bg-black/20 text-[10px] px-2 py-1 rounded font-bold uppercase tracking-widest">X Exit</button>
            <div className="bg-[#1A1A1A] text-white px-5 pt-8 pb-4 shadow-xl z-20"><div className="flex items-center gap-3"><div className="w-10 h-10 bg-[#FF4A22] rounded-xl flex items-center justify-center font-black text-lg">TC</div><div><div className="font-black text-xl tracking-tight leading-none mb-1">Partner Hub</div><div className="text-[10px] font-bold text-[#FF4A22] uppercase tracking-widest">Outlet #102 • Online</div></div></div></div>
            <div className="flex bg-white shadow z-10 border-b border-gray-200">
               <div onClick={()=>setTab('live')} className={`flex-1 text-center py-4 font-black border-b-[3px] text-xs uppercase tracking-widest transition-colors ${tab==='live'?'border-[#FF4A22] text-[#FF4A22]':'border-transparent text-gray-400'}`}>Live Orders</div>
               <div onClick={()=>setTab('tiffins')} className={`flex-1 text-center py-4 font-black border-b-[3px] text-xs uppercase tracking-widest transition-colors ${tab==='tiffins'?'border-[#FF4A22] text-[#FF4A22]':'border-transparent text-gray-400'}`}>Tiffins</div>
            </div>
            
            <div className="flex-1 overflow-y-auto w-full">
              {tab === 'live' && (
                <div className="p-4 animate-fadeIn">
                   <div className="bg-[#FFF3CD] border-l-4 border-[#FFE69C] text-[#664D03] p-4 rounded-r-lg flex items-start gap-3 mb-5 shadow-sm">
                       <i data-feather="alert-circle" className="w-5 h-5 flex-shrink-0 mt-0.5"></i>
                       <span className="text-sm font-bold opacity-90 leading-tight">Kitchen load is high. Preparations are running 5 mins behind schedule.</span>
                   </div>
                   
                   {/* Ringing Order */}
                   <div className="bg-white rounded-2xl shadow-[0_8px_30px_rgba(231,76,60,0.15)] overflow-hidden mb-5 border-2 border-[#E74C3C] relative animate-siren">
                     <div className="absolute top-0 right-0 bg-[#E74C3C] text-white font-black text-[10px] uppercase tracking-widest px-3 py-1.5 rounded-bl-xl shadow flex items-center"><span className="w-2 h-2 rounded-full bg-white animate-pulse mr-2"></span> RINGING</div>
                     <div className="p-5 border-b border-red-50 bg-[#fff5f5]">
                        <div className="flex justify-between items-end mb-1">
                           <h2 className="font-black text-2xl text-black">1540</h2>
                           <div className="text-[#E74C3C] font-black text-base flex items-center">-01:45</div>
                        </div>
                        <div className="text-[11px] text-gray-500 font-bold uppercase tracking-widest mt-2">{dayjs().format('MMM D, hh:mm A')} • Pre-paid</div>
                     </div>
                     <div className="p-5">
                         <div className="text-sm font-bold text-gray-800 mb-6 border-l-4 border-[#E74C3C] pl-4 leading-loose bg-gray-50 py-2 rounded-r-lg">
                            <span className="text-black font-black text-base">2x</span> Tandoori Chicken Tikka<br/>
                            <span className="text-black font-black text-base">1x</span> Dal Makhani
                         </div>
                         <div className="flex gap-3">
                            <button className="flex-1 bg-[#2ECC71] text-white font-black py-4 rounded-xl text-sm tracking-widest uppercase active:scale-95 shadow-[0_4px_10px_rgba(46,204,113,0.3)]">ACCEPT ORDER</button>
                            <button className="bg-gray-100 text-gray-500 font-black px-6 rounded-xl hover:bg-gray-200 active:scale-95"><i data-feather="x"></i></button>
                         </div>
                     </div>
                   </div>

                   {/* Preparing Order */}
                   <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden opacity-90 transition-opacity hover:opacity-100 mb-4 cursor-pointer">
                     <div className="p-5 border-b border-gray-100 flex justify-between items-center">
                        <div>
                           <h2 className="font-black text-xl text-black mb-1">1539</h2>
                           <div className="text-[10px] text-[#FFB800] font-black uppercase tracking-widest bg-yellow-50 px-2 py-1 rounded inline-block">Preparing</div>
                        </div>
                        <button className="bg-[#1A1A1A] text-white font-black tracking-widest text-[11px] uppercase px-5 py-3 rounded-lg shadow-sm">Food Ready</button>
                     </div>
                     <div className="bg-[#F8F9FA] p-4 text-xs text-gray-600 font-bold flex justify-between items-center">
                         <div className="flex items-center"><div className="w-2 h-2 rounded-full bg-blue-500 mr-2"></div> Rider Arriving: 4 mins</div>
                         <i data-feather="truck" className="w-5 h-5 text-gray-400"></i>
                     </div>
                   </div>
                </div>
              )}
              
              {tab === 'tiffins' && (
                <div className="p-4 animate-fadeIn">
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 flex justify-between items-center group cursor-pointer hover:border-[#FF4A22]">
                     <span className="font-bold text-gray-500 text-sm">Dispatch Date</span>
                     <div className="flex items-center gap-2 font-black text-black">Today, Oct 24 <i data-feather="chevron-down" className="w-4 h-4 text-[#FF4A22]"></i></div>
                  </div>
                  <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                      <div className="p-4 bg-[#F8F9FA] border-b border-gray-200 flex justify-between items-center">
                         <div className="text-[10px] font-black text-gray-500 uppercase tracking-widest">2 / 24 Picked Up</div>
                         <button className="text-[#FF4A22] text-xs font-black uppercase tracking-widest hover:underline px-2 py-1 bg-orange-50 rounded">Select All</button>
                      </div>
                      {[
                         {name:'Arjun', phone:'9988776655', plan:'Basic', addr:'A-204, Spectrum Heights', checked: false},
                         {name:'Sneha', phone:'8877665544', plan:'Premium', addr:'Villa 44, Palm Grove', checked: true}
                      ].map((t,i) => (
                          <div key={i} className={`p-5 flex justify-between items-center transition-colors ${i!==0?'border-t border-gray-100':''} ${t.checked?'bg-green-50/50':''}`}>
                              <div className="flex-1 pr-4">
                                  <h3 className={`font-black text-lg mb-1 flex items-center gap-2 ${t.checked?'text-gray-400 line-through':'text-black'}`}>
                                    {t.name}
                                    {!t.checked && <span className={`text-[9px] uppercase font-black px-2 py-1 rounded ${t.plan==='Premium'?'bg-yellow-100 text-yellow-800':'bg-blue-100 text-blue-800'}`}>{t.plan}</span>}
                                  </h3>
                                  <p className={`text-xs font-medium leading-relaxed ${t.checked?'text-gray-400':'text-gray-600'}`}>{t.addr}</p>
                              </div>
                              <input type="checkbox" defaultChecked={t.checked} className="w-7 h-7 rounded-sm border-2 border-gray-300 text-[#2ECC71] focus:ring-0 cursor-pointer transition-all" />
                          </div>
                      ))}
                      <div className="p-4 bg-gray-50">
                         <button className="w-full bg-[#1A1A1A] text-white font-black tracking-widest text-sm uppercase py-4 rounded-xl shadow-lg active:scale-95 flex justify-center items-center"><i data-feather="check" className="w-5 h-5 mr-2"></i> Update Dispatch</button>
                      </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }


    // --- MAIN HUB & AUTH ---
    const AuthScreen = ({ onLogin }) => {
      const [pwd, setPwd] = useState('');
      const [err, setErr] = useState('');
      const handleLogin = (e) => {
        e.preventDefault();
        if (pwd === 'chakna.com') { onLogin(); } else { setErr('Invalid passcode.'); }
      };
      useEffect(() => { feather.replace(); }, []);
      return (
        <div className="min-h-screen flex items-center justify-center bg-[#0d0d0d] px-5 animate-fadeIn bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-[#242424] to-[#0d0d0d]">
          <form onSubmit={handleLogin} className="bg-[#111] p-10 md:p-14 rounded-[40px] border border-[#222] shadow-[0_20px_60px_rgba(0,0,0,0.8)] max-w-sm w-full text-center relative overflow-hidden">
            <div className="absolute -top-10 -right-10 w-32 h-32 bg-[#FF4A22] rounded-full blur-[60px] opacity-20"></div>
            <h1 className="text-4xl font-black text-white mb-2 tracking-tight">The Chakna Co.</h1>
            <p className="text-[#FF4A22] font-black tracking-widest uppercase text-[10px] mb-10 border border-[#FF4A22]/30 inline-block px-3 py-1 rounded bg-[#FF4A22]/10">Unified Demo Platform</p>
            <input type="password" placeholder="Passcode" value={pwd} onChange={(e) => {setPwd(e.target.value); setErr('');}} className="w-full bg-[#1A1A1A] text-white p-5 rounded-2xl border-2 border-[#333] focus:border-[#FF4A22] focus:outline-none text-center text-xl font-bold tracking-widest mb-4 transition-colors" />
            {err && <p className="text-[#E74C3C] text-xs font-bold mb-4 uppercase tracking-widest">{err}</p>}
            <button type="submit" className="w-full bg-white text-black font-black py-5 rounded-2xl text-base uppercase tracking-widest hover:bg-gray-200 active:scale-95 transition-all shadow-[0_5px_15px_rgba(255,255,255,0.1)]">Unlock Platform</button>
          </form>
        </div>
      );
    };

    const HubScreen = ({ onSelect }) => {
      useEffect(() => { feather.replace(); }, []);
      return (
        <div className="min-h-screen bg-[#0d0d0d] p-6 md:p-12 lg:p-20 animate-fadeIn">
          <div className="max-w-5xl mx-auto mt-10">
            <h1 className="text-4xl md:text-6xl font-black text-white mb-4 tracking-tighter">Enter The Chakna Co.</h1>
            <p className="text-[#888] text-lg font-medium mb-12 border-b border-[#333] pb-8 leading-relaxed max-w-2xl">This interface aggregates all digital modules into a single sandbox environment. Select an application module below to emulate its user experience.</p>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div onClick={() => onSelect('customer')} className="bg-[#111] border-2 border-[#222] hover:border-[#FF4A22] p-8 md:p-10 rounded-[32px] cursor-pointer group transition-all relative overflow-hidden shadow-2xl">
                <div className="absolute -top-10 -right-10 w-40 h-40 bg-[#FF4A22] rounded-full blur-[80px] opacity-0 group-hover:opacity-20 transition-opacity"></div>
                <i data-feather="smartphone" className="text-[#666] w-12 h-12 mb-8 group-hover:text-[#FF4A22] transition-colors"></i>
                <h2 className="text-3xl font-black text-white mb-3 tracking-tight">Customer App</h2>
                <p className="text-[#888] font-medium leading-relaxed">Emulate the iOS React Native ordering flow for Restaurants, Catering, and Tiffins. Includes simulated Cart Checkout.</p>
              </div>
              <div onClick={() => onSelect('rm')} className="bg-[#111] border-2 border-[#222] hover:border-[#FF4A22] p-8 md:p-10 rounded-[32px] cursor-pointer group transition-all relative overflow-hidden shadow-2xl">
                <div className="absolute -top-10 -right-10 w-40 h-40 bg-[#FF4A22] rounded-full blur-[80px] opacity-0 group-hover:opacity-20 transition-opacity"></div>
                <i data-feather="tablet" className="text-[#666] w-12 h-12 mb-8 group-hover:text-[#FF4A22] transition-colors"></i>
                <h2 className="text-3xl font-black text-white mb-3 tracking-tight">Partner POS</h2>
                <p className="text-[#888] font-medium leading-relaxed">Zomato-inspired Android tablet view for managing live kitchen orders, alerting, and tiffin dispatch sheets.</p>
              </div>
              <div onClick={() => onSelect('admin')} className="bg-[#111] border-2 border-[#222] hover:border-[#FF4A22] p-8 md:p-10 rounded-[32px] cursor-pointer group transition-all relative overflow-hidden shadow-2xl">
                <div className="absolute -top-10 -right-10 w-40 h-40 bg-[#FF4A22] rounded-full blur-[80px] opacity-0 group-hover:opacity-20 transition-opacity"></div>
                <i data-feather="monitor" className="text-[#666] w-12 h-12 mb-8 group-hover:text-[#FF4A22] transition-colors"></i>
                <h2 className="text-3xl font-black text-white mb-3 tracking-tight">Super Admin</h2>
                <p className="text-[#888] font-medium leading-relaxed">Enter the desktop Super Admin dashboard layout utilizing Ant Design components and overarching analytics.</p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const MainApp = () => {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentApp, setCurrentApp] = useState(null);
      
      if (!isAuthenticated) return <AuthScreen onLogin={() => setIsAuthenticated(true)} />;
      if (currentApp === null) return <HubScreen onSelect={setCurrentApp} />;

      switch(currentApp) {
        case 'customer': return <CustomerApp onExit={() => setCurrentApp(null)} />;
        case 'rm': return <RMApp onExit={() => setCurrentApp(null)} />;
        case 'admin': return <AdminApp onExit={() => setCurrentApp(null)} />;
        default: return <HubScreen onSelect={setCurrentApp} />;
      }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
